<!DOCTYPE html>
<!--
  Media OS Logo — Transparent Background
  ─────────────────────────────────────────────
  HOW TO EXPORT AS TRANSPARENT PNG:
  1. Open in Firefox
  2. F12 > Ctrl+Shift+M (Responsive Design Mode)
  3. Set dimensions to 540 x 260
  4. Click the camera icon — saves a transparent PNG
  Upload to: Jellyfin > Dashboard > Branding > Custom logo
-->
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 1080px;
            height: 520px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 48px;
        }

        .logo-text {
            font-family: 'Press Start 2P', monospace;
            font-size: 96px;
            letter-spacing: 6px;
            line-height: 1.7;
        }

        .logo-text .media {
            display: block;
            color: #f2f2f2;
            text-shadow:
                6px 6px 0 rgba(0,0,0,0.8),
                10px 10px 0 rgba(0,0,0,0.3);
        }

        .logo-text .os {
            display: block;
            color: #cc2222;
            text-shadow:
                6px 6px 0 rgba(0,0,0,0.8),
                10px 10px 0 rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="logo">
        <svg width="280" height="310" viewBox="0 0 96 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="14" width="40" height="18" rx="7" fill="#cc2222"/>
            <rect x="0" y="28" width="96" height="68" rx="7" fill="#cc2222"/>
            <rect x="9" y="38" width="78" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
            <rect x="9" y="52" width="60" height="4" rx="2" fill="rgba(255,255,255,0.28)"/>
            <rect x="9" y="63" width="46" height="4" rx="2" fill="rgba(255,255,255,0.20)"/>
            <rect x="9" y="74" width="54" height="4" rx="2" fill="rgba(255,255,255,0.13)"/>
        </svg>

        <div class="logo-text">
            <span class="media">MEDIA</span>
            <span class="os">OS</span>
        </div>
    </div>
</body>
</html>
