<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>kerrick.ca — OS</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --win-bg: #82a3c7; 
      --win-body: #ced4da;
      --win-titlebar: #000080;
      --win-titlebar-end: #1084d0;
      --win-border-light: #ffffff;
      --win-border-dark: #808080;
      --win-border-darker: #050505;
      --text-dark: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--win-bg);
      background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      height: 100vh;
      overflow: hidden; /* Prevent body scroll, we use windows */
      cursor: default;
    }

    /* Desktop Area */
    #desktop {
      position: relative;
      width: 100%;
      height: calc(100vh - 36px);
      padding: 20px;
    }

    .desktop-icons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: fit-content;
    }

    .icon-item {
      width: 75px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      color: white;
      text-shadow: 1px 1px 2px black;
      font-size: 12px;
      user-select: none;
    }

    .icon-item:hover .icon-img { filter: brightness(1.2); }
    .icon-img { font-size: 32px; margin-bottom: 4px; }

    /* Window Styles */
    .window {
      position: absolute;
      background: var(--win-body);
      border: 2px solid;
      border-color: var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
      box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      min-width: 250px;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67), opacity 0.2s;
      z-index: 10;
    }

    .window.minimized {
      transform: scale(0.2) translateY(500px);
      opacity: 0;
      pointer-events: none;
    }

    .window.active { z-index: 100; }

    .titlebar {
      background: linear-gradient(90deg, var(--win-titlebar) 0%, var(--win-titlebar-end) 100%);
      padding: 3px 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: move;
      user-select: none;
    }

    .window.inactive .titlebar {
      background: linear-gradient(90deg, #808080, #b5b5b5);
    }

    .titlebar-text {
      font-family: 'VT323', monospace;
      font-size: 16px;
      color: white;
      font-weight: bold;
    }

    .titlebar-controls { display: flex; gap: 2px; }

    .win-btn {
      width: 18px;
      height: 16px;
      background: var(--win-body);
      border: 1px solid;
      border-color: var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
      font-size: 10px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .win-btn:active {
      border-color: var(--win-border-darker) var(--win-border-light) var(--win-border-light) var(--win-border-darker);
    }

    .window-body { padding: 10px; overflow-y: auto; flex-grow: 1; }

    /* Taskbar */
    .taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: var(--win-body);
      border-top: 2px solid var(--win-border-light);
      display: flex;
      align-items: center;
      padding: 2px 4px;
      gap: 4px;
      z-index: 1000;
    }

    .start-btn {
      height: 28px;
      padding: 0 8px;
      background: var(--win-body);
      border: 2px solid;
      border-color: var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .task-item {
      height: 28px;
      min-width: 100px;
      max-width: 160px;
      background: var(--win-body);
      border: 2px solid;
      border-color: var(--win-border-light) var(--win-border-darker) var(--win-border-darker) var(--win-border-light);
      font-size: 12px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
    }

    .task-item.active {
      background: #e0e0e0;
      border-color: var(--win-border-darker) var(--win-border-light) var(--win-border-light) var(--win-border-darker);
      font-weight: bold;
    }

    .clock {
      margin-left: auto;
      border: 2px inset #808080;
      padding: 2px 8px;
      font-family: 'VT323', monospace;
      font-size: 14px;
    }
    
    .inset {
      background: white;
      border: 2px inset #808080;
      padding: 10px;
    }
  </style>
</head>
<body>

<div id="desktop">
  <div class="desktop-icons">
    <div class="icon-item" onclick="openWindow('win-about')">
      <div class="icon-img">👤</div>
      <span>About Me</span>
    </div>
    <div class="icon-item" onclick="openWindow('win-train')">
      <div class="icon-img">🚂</div>
      <span>Train.jpg</span>
    </div>
    <div class="icon-item" onclick="openWindow('win-notes')">
      <div class="icon-img">📝</div>
      <span>Readme.txt</span>
    </div>
  </div>

  <div id="win-about" class="window" style="width: 350px; top: 50px; left: 150px;">
    <div class="titlebar">
      <span class="titlebar-text">About Kerrick</span>
      <div class="titlebar-controls">
        <div class="win-btn" onclick="minimizeWindow('win-about')">_</div>
        <div class="win-btn" onclick="closeWindow('win-about')">✕</div>
      </div>
    </div>
    <div class="window-body">
      <div class="inset" style="text-align: center;">
        <img src="diesel.png" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid #888;">
        <h2 style="font-family: 'VT323'; color: #000080;">KERRICK</h2>
        <p style="font-size: 13px;">Bald by genetics. Wired by caffeine.</p>
      </div>
    </div>
  </div>

  <div id="win-notes" class="window" style="width: 450px; top: 150px; left: 300px;">
    <div class="titlebar">
      <span class="titlebar-text">welcome.txt - Notepad</span>
      <div class="titlebar-controls">
        <div class="win-btn" onclick="minimizeWindow('win-notes')">_</div>
        <div class="win-btn" onclick="closeWindow('win-notes')">✕</div>
      </div>
    </div>
    <div class="window-body">
      <div class="inset" style="min-height: 200px; font-family: 'VT323'; font-size: 18px;">
        Hey! I'm kerrick. 👋<br><br>
        i spend my time breaking things on purpose to figure out how they work.
        no ads, no trackers, no hair. 🫡
      </div>
    </div>
  </div>

  <div id="win-train" class="window" style="width: 400px; top: 100px; left: 500px;">
    <div class="titlebar">
      <span class="titlebar-text">CoolTrain.png - Paint</span>
      <div class="titlebar-controls">
        <div class="win-btn" onclick="minimizeWindow('win-train')">_</div>
        <div class="win-btn" onclick="closeWindow('win-train')">✕</div>
      </div>
    </div>
    <div class="window-body">
      <div class="inset" style="background: #000; padding: 2px;">
        <img src="cooltrainpicture.png" alt="Train" style="width: 100%;">
      </div>
    </div>
  </div>
</div>

<div class="taskbar">
  <div class="start-btn">🪟 Start</div>
  <div id="taskbar-items" style="display: flex; gap: 4px;"></div>
  <div class="clock" id="clock">12:00 PM</div>
</div>

<script>
  const windows = document.querySelectorAll('.window');
  const taskbarItems = document.getElementById('taskbar-items');

  // 1. Dragging Logic
  windows.forEach(win => {
    const titlebar = win.querySelector('.titlebar');
    let isDragging = false;
    let offset = { x: 0, y: 0 };

    titlebar.addEventListener('mousedown', (e) => {
      isDragging = true;
      offset.x = e.clientX - win.offsetLeft;
      offset.y = e.clientY - win.offsetTop;
      focusWindow(win.id);
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      win.style.left = (e.clientX - offset.x) + 'px';
      win.style.top = (e.clientY - offset.y) + 'px';
    });

    document.addEventListener('mouseup', () => isDragging = false);
    
    // Focus on click
    win.addEventListener('mousedown', () => focusWindow(win.id));
  });

  // 2. Window Management
  function focusWindow(id) {
    windows.forEach(w => {
        w.classList.remove('active');
        w.classList.add('inactive');
    });
    const win = document.getElementById(id);
    win.classList.add('active');
    win.classList.remove('inactive');
    updateTaskbar();
  }

  function minimizeWindow(id) {
    document.getElementById(id).classList.add('minimized');
    updateTaskbar();
  }

  function closeWindow(id) {
    document.getElementById(id).style.display = 'none';
    updateTaskbar();
  }

  function openWindow(id) {
    const win = document.getElementById(id);
    win.style.display = 'flex';
    win.classList.remove('minimized');
    focusWindow(id);
  }

  // 3. Taskbar Sync
  function updateTaskbar() {
    taskbarItems.innerHTML = '';
    windows.forEach(win => {
      if (win.style.display !== 'none') {
        const title = win.querySelector('.titlebar-text').innerText;
        const btn = document.createElement('div');
        btn.className = `task-item ${win.classList.contains('active') && !win.classList.contains('minimized') ? 'active' : ''}`;
        btn.innerHTML = `<span>📂</span> ${title}`;
        btn.onclick = () => {
          if (win.classList.contains('minimized') || !win.classList.contains('active')) {
            openWindow(win.id);
          } else {
            minimizeWindow(win.id);
          }
        };
        taskbarItems.appendChild(btn);
      }
    });
  }

  // Clock
  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  }
  setInterval(updateClock, 1000);
  updateClock();
  
  // Initial state
  updateTaskbar();
</script>

</body>
</html>
